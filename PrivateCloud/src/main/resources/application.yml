    base-url: ${ALERT_FEEDBACK_AGENT_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
    api-key: ${ALERT_FEEDBACK_AGENT_API_KEY:sk-f550dad4e7b94842aa10bc29ef7cd5cc}
    model: ${ALERT_FEEDBACK_AGENT_MODEL:qwen-plus}
    temperature: ${ALERT_FEEDBACK_AGENT_TEMPERATURE:0.0}
    connect-timeout-ms: ${ALERT_FEEDBACK_AGENT_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${ALERT_FEEDBACK_AGENT_READ_TIMEOUT_MS:20000}

logging:
