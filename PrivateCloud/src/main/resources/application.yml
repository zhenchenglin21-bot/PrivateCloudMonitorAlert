server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/private_cloud?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: root0627
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Shanghai
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}

influxdb:
  url: http://localhost:8086
  token: FqEzTQQWE8Ebup-gVeDKJeCzoP-O7nvu3KknpcvmEvSslUVUZF_ihNRnFd8FuLnZNgLD6j9WHS4c-wFx2xsbNQ==
  org: monitor-org
  bucket: metrics2

alert:
  ingest-key: sk-dfe28de1d1f2405495cc813ca7ed1caf
  notification:
    scheduler-delay-ms: 60000
    mail-from: ${MAIL_FROM:}
    mail-from-name: ${MAIL_FROM_NAME:PrivateCloud Monitor}
    imap:
      host: ${MAIL_IMAP_HOST:}
      port: ${MAIL_IMAP_PORT:993}
      starttls:
        enable: ${MAIL_IMAP_STARTTLS_ENABLE:false}
