<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
    <style>
      .title { font: 700 30px 'Microsoft YaHei', SimSun, sans-serif; fill: #222; }
      .label { font: 600 22px 'Microsoft YaHei', SimSun, sans-serif; fill: #222; }
      .text { font: 20px 'Microsoft YaHei', SimSun, sans-serif; fill: #333; }
      .note { font: 18px 'Microsoft YaHei', SimSun, sans-serif; fill: #444; }
      .box { rx: 18; ry: 18; stroke-width: 2.5; }
      .line { stroke: #555; stroke-width: 3; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="20" y="20" width="1560" height="860" fill="#f8f8f8" stroke="#666" stroke-width="2"/>
  <text x="800" y="70" text-anchor="middle" class="title">图2-3 三检测器融合决策流程图</text>

  <rect x="80" y="150" width="280" height="100" class="box" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="220" y="208" text-anchor="middle" class="label">监控指标数据输入</text>

  <rect x="430" y="150" width="320" height="100" class="box" fill="#fff2cc" stroke="#d6b656"/>
  <text x="590" y="198" text-anchor="middle" class="label">动态基线构建</text>
  <text x="590" y="228" text-anchor="middle" class="text">历史窗口、均值、波动尺度</text>

  <rect x="200" y="360" width="260" height="110" class="box" fill="#ffe6cc" stroke="#d79b00"/>
  <text x="330" y="425" text-anchor="middle" class="label">突发检测器</text>

  <rect x="540" y="360" width="260" height="110" class="box" fill="#d5e8d4" stroke="#82b366"/>
  <text x="670" y="425" text-anchor="middle" class="label">持续检测器</text>

  <rect x="880" y="360" width="260" height="110" class="box" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="1010" y="425" text-anchor="middle" class="label">趋势检测器</text>

  <rect x="1210" y="330" width="290" height="170" class="box" fill="#fff2cc" stroke="#d6b656"/>
  <text x="1355" y="390" text-anchor="middle" class="label">加权融合决策</text>
  <text x="1355" y="430" text-anchor="middle" class="text">F = w1S1 + w2S2 + w3S3</text>
  <text x="1355" y="465" text-anchor="middle" class="note">综合三个检测器输出最终得分</text>

  <rect x="1210" y="610" width="290" height="110" class="box" fill="#f8cecc" stroke="#b85450"/>
  <text x="1355" y="668" text-anchor="middle" class="label">动态告警等级输出</text>
  <text x="1355" y="698" text-anchor="middle" class="text">warning / alert / critical</text>

  <rect x="200" y="610" width="820" height="110" class="box" fill="#f5f5f5" stroke="#666"/>
  <text x="610" y="655" text-anchor="middle" class="label">后续告警处理</text>
  <text x="610" y="690" text-anchor="middle" class="text">结合静态阈值、异常进程识别、去重抑制和恢复处理生成最终告警</text>

  <path d="M360 200 L430 200" class="line"/>
  <path d="M590 250 L590 330 L330 330 L330 360" class="line"/>
  <path d="M590 250 L590 360" class="line"/>
  <path d="M590 250 L590 330 L1010 330 L1010 360" class="line"/>
  <path d="M460 415 L1210 415" class="line"/>
  <path d="M800 415 L1210 415" class="line"/>
  <path d="M1140 415 L1210 415" class="line"/>
  <path d="M1355 500 L1355 610" class="line"/>
  <path d="M1210 665 L1020 665" class="line"/>

  <text x="220" y="810" class="note">说明：该图突出三检测器融合决策主线，适合放在“2.4 智能告警机制设计”中使用。</text>
</svg>
